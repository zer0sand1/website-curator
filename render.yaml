services:
  - type: web
    name: website-curator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: website-curator-db
          property: connectionString

databases:
  - name: website-curator-db
    plan: free
    databaseName: curator
